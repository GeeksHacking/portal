name: Deploy (API)

on:
  push:
    paths:
      - "GeeksHackingPortal.Api/**"
      - "GeeksHackingPortal.DbMigrator/**"
      - ".github/workflows/deploy-api.yml"
    branches: ["main"]

  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to deploy to"
        required: true
        default: "production"
        type: choice
        options:
          - production

defaults:
  run:
    shell: pwsh

jobs:
  # Generate a human-readable schema diff before any deploy work starts.
  # The later apply job is gated on this result so reviewers can inspect drift first.
  database-diff:
    concurrency: deploy
    runs-on: ubuntu-latest
    outputs:
      has_changes: ${{ steps.diff.outputs.has_changes }}
    env:
      DOTNET_CLI_TELEMETRY_OPTOUT: 1
      DOTNET_NOLOGO: true
      NUGET_XMLDOC_MODE: skip

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.202
          cache: true
          cache-dependency-path: |
            global.json
            **/*.csproj

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v3
        with:
          token_format: access_token
          workload_identity_provider: projects/242247218750/locations/global/workloadIdentityPools/github/providers/github
          service_account: hackomania-api-deployer@hackomania-event-portal.iam.gserviceaccount.com

      - name: Read database connection string
        id: secrets
        uses: google-github-actions/get-secretmanager-secrets@v3
        with:
          secrets: |-
            tidb_connection_string:hackomania-event-portal/tidb-connection-string

      - name: Generate database schema diff
        id: diff
        run: |
          $ErrorActionPreference = 'Continue'
          # Capture the migrator output into a file so we can both print it and upload it.
          # The diff command returns 0 when there are no changes and 2 when drift exists.
          $output = dotnet run --project GeeksHackingPortal.DbMigrator --configuration Release -- diff 2>&1
          $status = $LASTEXITCODE
          $output | Out-File -FilePath db-schema-diff.txt -Encoding utf8
          Get-Content db-schema-diff.txt

          # Convert the migrator exit code into a workflow output instead of failing the job.
          if ($status -eq 0) {
            "has_changes=false" | Out-File -Append -FilePath $env:GITHUB_OUTPUT -Encoding utf8
          } elseif ($status -eq 2) {
            "has_changes=true" | Out-File -Append -FilePath $env:GITHUB_OUTPUT -Encoding utf8
          } else {
            exit $status
          }

          # Publish the same diff into the workflow summary so approvers can read it in the UI.
          "## Database Schema Diff" | Out-File -Append -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8
          "" | Out-File -Append -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8
          '```text' | Out-File -Append -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8
          Get-Content db-schema-diff.txt | Out-File -Append -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8
          '```' | Out-File -Append -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8
        env:
          ConnectionStrings__db: ${{ steps.secrets.outputs.tidb_connection_string }}

      - name: Upload database diff artifact
        uses: actions/upload-artifact@v4
        with:
          name: db-schema-diff
          path: db-schema-diff.txt

  # This job is intentionally separate so GitHub environment protection can pause here
  # and require human approval before applying schema changes to the live database.
  apply-database-changes:
    needs: database-diff
    if: needs.database-diff.outputs.has_changes == 'true'
    concurrency: deploy
    runs-on: ubuntu-latest
    environment:
      name: production-database
    env:
      DOTNET_CLI_TELEMETRY_OPTOUT: 1
      DOTNET_NOLOGO: true
      NUGET_XMLDOC_MODE: skip

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.202
          cache: true
          cache-dependency-path: |
            global.json
            **/*.csproj

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v3
        with:
          token_format: access_token
          workload_identity_provider: projects/242247218750/locations/global/workloadIdentityPools/github/providers/github
          service_account: hackomania-api-deployer@hackomania-event-portal.iam.gserviceaccount.com

      - name: Read database connection string
        id: secrets
        uses: google-github-actions/get-secretmanager-secrets@v3
        with:
          secrets: |-
            tidb_connection_string:hackomania-event-portal/tidb-connection-string

      - name: Apply approved database schema changes
        run: dotnet run --project GeeksHackingPortal.DbMigrator --configuration Release -- apply --allow-destructive
        env:
          ConnectionStrings__db: ${{ steps.secrets.outputs.tidb_connection_string }}

  # Only build and deploy once the diff job succeeded and any required schema apply either
  # completed successfully or was skipped because there was no database drift.
  build-and-deploy:
    needs:
      - database-diff
      - apply-database-changes
    if: |
      always() &&
      needs.database-diff.result == 'success' &&
      (needs.apply-database-changes.result == 'success' || needs.apply-database-changes.result == 'skipped')
    concurrency: deploy
    runs-on: ubuntu-latest
    env:
      DOTNET_CLI_TELEMETRY_OPTOUT: 1
      DOTNET_NOLOGO: true
      NUGET_XMLDOC_MODE: skip

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.202
          cache: true
          cache-dependency-path: |
            global.json
            **/*.csproj

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v3
        with:
          token_format: access_token
          workload_identity_provider: projects/242247218750/locations/global/workloadIdentityPools/github/providers/github
          service_account: hackomania-api-deployer@hackomania-event-portal.iam.gserviceaccount.com

      - name: Set up Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Artifact Registry
        uses: docker/login-action@v3
        with:
          registry: asia-southeast1-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: asia-southeast1-docker.pkg.dev/hackomania-event-portal/hackomania-api/hackomania-api
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: GeeksHackingPortal.Api/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      - name: Deploy to Cloud Run
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: hackomania-api
          region: asia-southeast1
          image: asia-southeast1-docker.pkg.dev/hackomania-event-portal/hackomania-api/hackomania-api:latest
          tag: latest

      - name: Clean up stale images
        run: |
          $keep = 10
          $repo = "asia-southeast1-docker.pkg.dev/hackomania-event-portal/hackomania-api/hackomania-api"

          # List all image digests sorted by creation time (newest first), then drop the first $keep entries.
          $stale = gcloud artifacts docker images list $repo `
            --include-tags `
            --sort-by="~CREATE_TIME" `
            --format="value(version)" |
            Select-Object -Skip $keep

          if (-not $stale) {
            Write-Host "No stale images to remove."
            exit 0
          }

          Write-Host "Removing $($stale.Count) stale image(s)..."
          foreach ($digest in $stale) {
            gcloud artifacts docker images delete "${repo}@${digest}" --quiet --delete-tags
          }
